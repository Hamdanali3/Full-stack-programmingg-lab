<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 6 — API Data Fetcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav class="back-nav">
        <a href="../index.html" class="back-link">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 10H5m0 0l5-5m-5 5l5 5"/></svg>
            Back
        </a>
    </nav>

    <div class="container" style="max-width: 1000px; padding-top: 2.5rem;">
        <header class="task-header" style="text-align:center; margin-bottom:2rem;">
            <span class="badge badge-cyan">Task 6</span>
            <h1 class="section-title" style="margin-top:.75rem;">API Data Fetcher</h1>
            <p class="text-dim" style="max-width:600px;margin:0 auto;">Search, browse and explore posts from a REST API using jQuery Ajax, DOM Manipulation &amp; Event Handling.</p>
        </header>

        <!-- Controls -->
        <div class="controls glass-card" style="margin-bottom:1.5rem;">
            <div class="controls-row">
                <div class="search-wrap">
                    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M13 13l4 4"/></svg>
                    <input type="text" id="searchInput" class="input-field" placeholder="Search posts…" />
                </div>
                <div class="sort-wrap">
                    <label class="text-dim" style="font-size:.85rem;">Sort</label>
                    <select id="sortSelect" class="input-field">
                        <option value="id-asc">ID ↑</option>
                        <option value="id-desc">ID ↓</option>
                        <option value="title-asc">Title A→Z</option>
                        <option value="title-desc">Title Z→A</option>
                    </select>
                </div>
                <button id="refreshBtn" class="btn btn-cyan">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1v5h5"/><path d="M3.5 10a6.5 6.5 0 1 0 1.3-4.5L1 6"/></svg>
                    Refresh
                </button>
            </div>
            <div id="stats" class="stats-bar text-dim" style="margin-top:.75rem;font-size:.82rem;">Loading…</div>
        </div>

        <!-- Post Grid -->
        <div id="postGrid" class="post-grid"></div>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>

        <!-- Detail Modal -->
        <div id="modal" class="modal-overlay">
            <div class="modal-content glass-card">
                <button id="modalClose" class="modal-close">&times;</button>
                <span class="badge badge-indigo" id="modalBadge"></span>
                <h2 id="modalTitle" style="margin:.5rem 0 1rem;"></h2>
                <p id="modalBody" style="line-height:1.8;color:var(--text-dim);"></p>
                <hr style="border-color:var(--glass-border);margin:1.5rem 0;" />
                <h3 style="font-size:.95rem;margin-bottom:.75rem;">Comments</h3>
                <div id="modalComments" class="comments-list"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
