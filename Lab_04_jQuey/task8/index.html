<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 8 — Interactive Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav class="back-nav">
        <a href="../index.html" class="back-link">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 10H5m0 0l5-5m-5 5l5 5"/></svg>
            Back
        </a>
    </nav>

    <div class="container" style="max-width:720px; padding-top:2.5rem;">

        <!-- ── Start Screen ── -->
        <div id="startScreen" class="screen glass-card" style="text-align:center;padding:3rem 2rem;">
            <span class="badge badge-emerald" style="font-size:.85rem;">Task 8</span>
            <h1 style="margin:.75rem 0 .5rem;font-size:1.8rem;">JavaScript Quiz</h1>
            <p class="text-dim" style="max-width:420px;margin:0 auto 2rem;">10 challenging questions · 15 seconds each · Real-time scoring.<br>Built with jQuery DOM Manipulation, Effects &amp; Events.</p>
            <div class="difficulty-select">
                <button class="diff-btn active" data-time="20">Easy (20 s)</button>
                <button class="diff-btn" data-time="15">Medium (15 s)</button>
                <button class="diff-btn" data-time="10">Hard (10 s)</button>
            </div>
            <button id="startBtn" class="btn btn-primary" style="margin-top:1.5rem;padding:.85rem 2.5rem;font-size:1rem;">
                Start Quiz
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="margin-left:.35rem;"><path d="M1 8h14m0 0l-5-5m5 5l-5 5"/></svg>
            </button>
        </div>

        <!-- ── Quiz Screen ── -->
        <div id="quizScreen" class="screen" style="display:none;">
            <!-- Progress -->
            <div class="quiz-progress glass-card" style="padding:1rem 1.25rem;margin-bottom:1.25rem;">
                <div class="progress-top">
                    <span id="qNum" class="text-dim" style="font-weight:600;"></span>
                    <span id="scoreLabel" class="text-dim" style="font-weight:600;">Score: <span id="scoreLive" style="color:var(--accent-emerald);">0</span></span>
                </div>
                <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
            </div>

            <!-- Timer -->
            <div class="timer-bar glass-card" style="padding:.75rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem;">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="9" r="7"/><path d="M9 5.5V9l2.5 1.5"/></svg>
                <div class="timer-track"><div id="timerFill" class="timer-fill"></div></div>
                <span id="timerText" style="font-weight:700;font-size:.9rem;min-width:30px;text-align:right;">15</span>
            </div>

            <!-- Question card -->
            <div id="questionCard" class="glass-card" style="padding:2rem;">
                <h2 id="questionText" style="font-size:1.1rem;line-height:1.6;margin-bottom:1.5rem;"></h2>
                <div id="options" class="options-grid"></div>
                <div id="feedback" class="feedback" style="display:none;"></div>
            </div>

            <button id="nextBtn" class="btn btn-primary" style="margin-top:1.25rem;width:100%;display:none;">
                Next Question →
            </button>
        </div>

        <!-- ── Results Screen ── -->
        <div id="resultScreen" class="screen" style="display:none;">
            <div class="glass-card" style="text-align:center;padding:2.5rem 2rem;">
                <div id="resultIcon" class="result-icon"></div>
                <h2 id="resultTitle" style="margin:.75rem 0 .3rem;font-size:1.6rem;"></h2>
                <p id="resultSub" class="text-dim" style="margin-bottom:1.5rem;"></p>
                <div class="result-stats">
                    <div class="stat-box">
                        <span class="stat-val" id="rCorrect" style="color:var(--accent-emerald);">0</span>
                        <span class="stat-label">Correct</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="rWrong" style="color:var(--accent-rose);">0</span>
                        <span class="stat-label">Wrong</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="rScore" style="color:var(--accent-cyan);">0</span>
                        <span class="stat-label">Score</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="rTime" style="color:var(--accent-amber);">0s</span>
                        <span class="stat-label">Avg Time</span>
                    </div>
                </div>
            </div>

            <!-- Review -->
            <h3 style="margin:2rem 0 1rem;font-size:1rem;">Review Answers</h3>
            <div id="reviewList"></div>

            <button id="retryBtn" class="btn btn-primary" style="margin-top:1.5rem;width:100%;padding:.85rem;">
                🔄  Retry Quiz
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
