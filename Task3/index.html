<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Opus 5.0 – Smart Calculator</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet" />
</head>

<body>

  <div class="calc-wrapper">
    <div class="calc-card">

      <!-- ===== HEADER ===== -->
      <div class="calc-header">
        <h1><i class="bi bi-stars"></i> Claude Opus 5.0 Calculator</h1>
        <p>Upgraded smart calculations with instant and accurate results</p>
      </div>

      <!-- ===== BODY ===== -->
      <div class="calc-body">

        <!-- Input Row -->
        <div class="input-section">
          <!-- Number 1 -->
          <div class="input-field">
            <label for="num1">First Number</label>
            <input type="text" id="num1" placeholder="e.g. 25" autocomplete="off" />
            <div class="error-msg" id="error1"></div>
          </div>

          <!-- Operation Symbol -->
          <div class="op-symbol" id="opSymbol">+</div>

          <!-- Number 2 -->
          <div class="input-field">
            <label for="num2">Second Number</label>
            <input type="text" id="num2" placeholder="e.g. 10" autocomplete="off" />
            <div class="error-msg" id="error2"></div>
          </div>
        </div>

        <!-- Operation Dropdown -->
        <div class="input-field" style="margin-bottom: 20px;">
          <label for="operation">Select Operation</label>
          <select id="operation">
            <option value="add">➕  Addition ( + )</option>
            <option value="subtract">➖  Subtraction ( − )</option>
            <option value="multiply">✖️  Multiplication ( × )</option>
            <option value="divide">➗  Division ( ÷ )</option>
            <option value="power">⚡  Power ( ^ )</option>
            <option value="modulus">🧮  Modulus ( % )</option>
          </select>
        </div>

        <!-- Calculate Button -->
        <button class="btn-calculate" id="btnCalculate">
          <i class="bi bi-lightning-charge-fill"></i> Calculate
        </button>

        <!-- Result Box -->
        <div class="result-box" id="resultBox">
          <div class="result-label">Result</div>
          <div class="result-expression" id="resultExpression"></div>
          <div class="result-value" id="resultValue"></div>
        </div>

        <!-- Clear Button -->
        <button class="btn-clear" id="btnClear">
          <i class="bi bi-arrow-counterclockwise"></i> Clear All
        </button>

        <!-- History -->
        <div class="history-section" id="historySection" style="display:none;">
          <div class="history-title"><i class="bi bi-clock-history"></i> Recent Calculations</div>
          <div class="history-list" id="historyList"></div>
        </div>

      </div>
      <!-- END calc-body -->

    </div>
  </div>

  <!-- Custom JS -->
  <script src="js/script.js"></script>

</body>

</html>
