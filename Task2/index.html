<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Quiz – Lab 02</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet" />
</head>

<body>

  <div class="quiz-wrapper">
    <div class="quiz-card">

      <!-- ===== HEADER ===== -->
      <div class="quiz-header">
        <h1><i class="bi bi-patch-question-fill"></i> Web Development Quiz</h1>
        <p>Test your knowledge of HTML, CSS &amp; JavaScript</p>
      </div>

      <!-- ===== PROGRESS BAR ===== -->
      <div class="progress-bar-container">
        <div class="progress-info">
          <span id="progressText">0 / 5 answered</span>
          <span><span id="totalQuestions">5</span> Questions</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- ===== QUIZ BODY (Questions rendered by JS) ===== -->
      <div class="quiz-body" id="quizBody">
        <!-- Questions will be injected here by script.js -->
      </div>

      <!-- ===== RESULT SECTION ===== -->
      <div class="quiz-body">
        <div class="result-section" id="resultSection">
          <div class="result-circle" id="resultCircle">
            <span id="scoreValue">0/5</span>
            <span class="score-text">Score</span>
          </div>
          <p class="result-message" id="resultMessage"></p>
          <p class="result-detail" id="resultDetail"></p>
        </div>
      </div>

      <!-- ===== BUTTONS ===== -->
      <div class="quiz-footer">
        <button class="btn-quiz btn-reset" id="btnReset">
          <i class="bi bi-arrow-counterclockwise"></i> Reset Quiz
        </button>
        <button class="btn-quiz btn-submit-quiz" id="btnSubmit">
          Submit Answers <i class="bi bi-check2-all"></i>
        </button>
      </div>

    </div>
  </div>

  <!-- Custom JS (no jQuery needed — pure vanilla JS) -->
  <script src="js/script.js"></script>

</body>

</html>
