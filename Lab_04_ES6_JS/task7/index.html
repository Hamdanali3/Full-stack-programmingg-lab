<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 7 — Drag &amp; Drop Kanban</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <nav class="back-nav">
        <a href="../index.html" class="back-link">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 10H5m0 0l5-5m-5 5l5 5"/></svg>
            Back
        </a>
    </nav>

    <div class="container" style="max-width:1100px; padding-top:2.5rem;">
        <header class="task-header" style="text-align:center; margin-bottom:2rem;">
            <span class="badge badge-rose">Task 7</span>
            <h1 class="section-title" style="margin-top:.75rem;">Drag &amp; Drop Kanban</h1>
            <p class="text-dim" style="max-width:620px;margin:0 auto;">Organise tasks across columns by dragging cards. Built with jQuery DOM Manipulation, Event Handling &amp; CSS Manipulation.</p>
        </header>

        <!-- Add Task -->
        <div class="add-bar glass-card" style="margin-bottom:1.5rem;">
            <input type="text" id="taskInput" class="input-field" placeholder="New task title…" />
            <select id="prioritySelect" class="input-field" style="width:140px;">
                <option value="low">🟢 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
            </select>
            <button id="addTaskBtn" class="btn btn-primary">+ Add</button>
        </div>

        <!-- Board -->
        <div class="board">
            <!-- To Do -->
            <div class="column" data-col="todo">
                <div class="col-header">
                    <span class="col-dot" style="background:var(--accent-cyan);"></span>
                    <h2>To Do</h2>
                    <span class="col-count">0</span>
                </div>
                <div class="card-list" id="todoList"></div>
            </div>
            <!-- In Progress -->
            <div class="column" data-col="progress">
                <div class="col-header">
                    <span class="col-dot" style="background:var(--accent-amber);"></span>
                    <h2>In Progress</h2>
                    <span class="col-count">0</span>
                </div>
                <div class="card-list" id="progressList"></div>
            </div>
            <!-- Done -->
            <div class="column" data-col="done">
                <div class="col-header">
                    <span class="col-dot" style="background:var(--accent-emerald);"></span>
                    <h2>Done</h2>
                    <span class="col-count">0</span>
                </div>
                <div class="card-list" id="doneList"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
