<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1 — Dynamic List Manager</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <a href="../index.html" class="back-nav">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Lab Tasks
            </a>

            <div class="task-header">
                <div class="flex gap-sm mb-sm">
                    <span class="badge badge-indigo">DOM</span>
                    <span class="badge badge-cyan">Events</span>
                    <span class="badge badge-rose">CSS</span>
                </div>
                <h1 class="text-gradient">Dynamic List Manager</h1>
                <p class="task-desc">Add, search, filter, and remove list items dynamically with hover highlighting and animated transitions.</p>
            </div>

            <!-- Toolbar -->
            <div class="panel toolbar">
                <div class="toolbar-row">
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="searchInput" class="input-field" placeholder="Search items...">
                    </div>
                    <div class="filter-btns">
                        <button class="btn btn-ghost btn-sm filter-btn active" data-filter="all">All</button>
                        <button class="btn btn-ghost btn-sm filter-btn" data-filter="active">Active</button>
                        <button class="btn btn-ghost btn-sm filter-btn" data-filter="completed">Done</button>
                    </div>
                </div>
                <div class="toolbar-row mt-sm">
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                        <input type="text" id="itemInput" class="input-field" placeholder="Add a new item..." maxlength="80">
                    </div>
                    <select id="prioritySelect" class="input-field priority-select">
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                        <option value="low">Low</option>
                    </select>
                    <button id="addBtn" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                        Add
                    </button>
                </div>
            </div>

            <!-- Stats bar -->
            <div class="stats-bar">
                <span class="stat"><span class="stat-num" id="totalCount">0</span> Total</span>
                <span class="stat"><span class="stat-num" id="activeCount">0</span> Active</span>
                <span class="stat"><span class="stat-num" id="doneCount">0</span> Done</span>
                <button id="clearDone" class="btn btn-ghost btn-sm">Clear Done</button>
            </div>

            <!-- List area -->
            <div id="listArea" class="list-area">
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6"/></svg>
                    <p>No items yet. Add your first item above!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
