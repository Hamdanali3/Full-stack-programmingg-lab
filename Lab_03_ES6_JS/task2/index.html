<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 — Online Shopping Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #6b7280;
            --accent: #059669;
            --accent-soft: #ecfdf5;
            --border: #e5e7eb;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 880px; margin: 0 auto; padding: 48px 24px 80px; }
        .hdr { margin-bottom: 36px; }
        .hdr .badge {
            display: inline-block; font-size: .72rem; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--accent); background: var(--accent-soft);
            padding: 4px 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .hdr h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
        .hdr p { font-size: .92rem; color: var(--muted); }

        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px; margin-bottom: 24px;
        }
        .panel h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 16px; }

        .output-block {
            background: #f9fafb; border: 1px solid var(--border);
            border-radius: 8px; padding: 16px 20px;
            font-size: .88rem; line-height: 1.7;
            margin-bottom: 14px; white-space: pre-wrap;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #374151;
        }
        .label {
            display: inline-block; font-size: .72rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: .05em;
            padding: 3px 10px; border-radius: 5px; margin-bottom: 10px;
        }
        .label.rest { background: #fef3c7; color: #92400e; }
        .label.spread { background: #e0e7ff; color: #3730a3; }
        .label.destr { background: #fce7f3; color: #9d174d; }

        .total-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--accent-soft); border-radius: 8px;
            padding: 14px 20px; margin-top: 8px;
        }
        .total-bar span { font-weight: 600; color: var(--accent); }

        .ft {
            margin-top: 48px; padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: .8rem; color: var(--muted); text-align: center;
        }
        @media (max-width: 640px) {
            .wrap { padding: 28px 16px 60px; }
            .hdr h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="hdr">
        <span class="badge">Lab 03 — Task 2</span>
        <h1>Online Shopping Cart</h1>
        <p>Rest &amp; Spread Operators &middot; Array Destructuring &middot; Cart Operations</p>
    </header>

    <section id="app"></section>

    <footer class="ft">Developed by Hamdan Ali — Full-Stack Programming Lab 03</footer>
</div>
<script src="script.js"></script>
</body>
</html>
