<!DOCTYPE html>
<html lang="en">
<head>

    <title>Lab Task 2 - Online Shopping Cart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

        .card h2 { color: #2980b9; margin-bottom: 12px; font-size: 1.3rem; }
        .card p { color: #555; margin: 8px 0; font-size: 1rem; line-height: 1.6; }
        .label { font-weight: bold; color: #2c3e50; }
        .highlight { background: #eaf2f8; padding: 8px 14px; border-radius: 6px; display: inline-block; margin: 4px 2px; color: #2980b9; font-size: 0.95rem; }

</head>
