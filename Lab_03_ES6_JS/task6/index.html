<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 6 - Mini University Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a192f, #112240, #1d3557);
            color: #e0e0e0;
            padding: 20px;
        }
        .header {
            text-align: center; padding: 40px 20px 30px;
            animation: fadeDown 0.8s ease;
        }
        .header h1 {
            font-size: 2.4rem; font-weight: 700;
            background: linear-gradient(90deg, #64ffda, #48bfe3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 1rem; color: #aaa; font-weight: 300; margin-top: 6px; }
        .header .badges {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 16px;
        }
        .header .tech-badge {
            padding: 5px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 500;
            background: rgba(100, 255, 218, 0.08);
            color: #64ffda; border: 1px solid rgba(100, 255, 218, 0.2);
        }

        .btn-greet {
            display: inline-block; margin: 10px auto 30px; padding: 12px 32px;
            background: linear-gradient(135deg, #64ffda, #48bfe3);
            color: #0a192f; border: none; border-radius: 50px;
            font-family: 'Poppins', sans-serif; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 4px 20px rgba(100, 255, 218, 0.3);
        }
        .btn-greet:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 30px rgba(100, 255, 218, 0.45); }

        #output { max-width: 800px; margin: 0 auto; padding: 0 10px; }

        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 28px;
            margin-bottom: 24px;
            animation: fadeUp 0.6s ease both;
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, #64ffda, #48bfe3);
        }

        .card h2 {
            font-size: 1.25rem; font-weight: 600; color: #64ffda;
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .card p { margin: 8px 0; font-size: 0.95rem; }
        .label { font-weight: 500; color: #8892b0; }
        .value { color: #ccd6f6; font-weight: 500; }

        .student-row {
            background: rgba(100, 255, 218, 0.04);
            border: 1px solid rgba(100, 255, 218, 0.1);
            border-radius: 16px; padding: 22px; margin: 14px 0;
            display: grid; grid-template-columns: 56px 1fr;
            gap: 18px; align-items: start;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .student-row:hover {
            transform: translateX(6px);
            box-shadow: 0 8px 25px rgba(100, 255, 218, 0.08);
        }
        .avatar {
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(135deg, #64ffda, #48bfe3);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: #0a192f; font-size: 1rem;
        }

        .course-tag {
            padding: 4px 14px; border-radius: 50px; font-size: 0.8rem; font-weight: 500;
            background: rgba(100, 255, 218, 0.08);
            color: #64ffda; border: 1px solid rgba(100, 255, 218, 0.2);
            display: inline-block; margin: 3px 2px;
            transition: background 0.25s, transform 0.25s;
        }
        .course-tag:hover { background: rgba(100, 255, 218, 0.2); transform: scale(1.05); }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(72, 191, 227, 0.12);
            color: #48bfe3; padding: 6px 16px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 600;
        }

        .loading {
            text-align: center; padding: 30px; font-size: 1.1rem; color: #64ffda;
            animation: pulse 1.5s ease infinite;
        }
        .loading i { font-size: 2rem; display: block; margin-bottom: 14px; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .success-banner {
            background: rgba(100, 255, 218, 0.06);
            border-left: 3px solid #64ffda;
            padding: 14px 18px; border-radius: 10px;
            color: #64ffda; font-weight: 500; margin-top: 8px;
        }
        .error-banner {
            background: rgba(255, 68, 68, 0.06);
            border-left: 3px solid #ff4444;
            padding: 14px 18px; border-radius: 10px;
            color: #ff6b6b; font-weight: 500; margin-top: 8px;
        }

        @keyframes fadeDown { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }

        @media(max-width:768px){ .header h1{font-size:1.8rem} .student-row{grid-template-columns:1fr} }
        @media(max-width:480px){ body{padding:10px} .header h1{font-size:1.5rem} .card{padding:20px 16px} }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-university"></i> Mini University Portal</h1>
        <p>Lab Task 6 &mdash; Class + Map + Set + Promise</p>
        <div class="badges">
            <span class="tech-badge"><i class="fas fa-cube"></i> Class</span>
            <span class="tech-badge"><i class="fas fa-map"></i> Map</span>
            <span class="tech-badge"><i class="fas fa-layer-group"></i> Set</span>
            <span class="tech-badge"><i class="fas fa-clock-rotate-left"></i> Promise</span>
        </div>
    </div>

    <div style="text-align:center;">
        <button class="btn-greet" onclick="alert('Welcome to the University Portal!')">
            <i class="fas fa-hand-sparkles"></i>&ensp;Click to Greet
        </button>
    </div>

    <div id="output"></div>

    <script src="script.js"></script>
</body>
</html>
