<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6 — Mini University Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #6b7280;
            --accent: #4f46e5;
            --accent-soft: #eef2ff;
            --border: #e5e7eb;
            --radius: 10px;
            --success: #059669;
            --success-soft: #ecfdf5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 940px; margin: 0 auto; padding: 48px 24px 80px; }
        .hdr { margin-bottom: 36px; }
        .hdr .badge {
            display: inline-block; font-size: .72rem; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--accent); background: var(--accent-soft);
            padding: 4px 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .hdr h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
        .hdr p { font-size: .92rem; color: var(--muted); }

        .btn {
            padding: 10px 24px; font-size: .84rem; font-weight: 500;
            font-family: inherit; border: none; border-radius: 8px;
            cursor: pointer; transition: background .2s; margin-bottom: 24px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #4338ca; }

        #status {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px 22px;
            font-size: .88rem; color: var(--muted); margin-bottom: 24px;
            display: flex; align-items: center; gap: 10px;
        }
        .spinner {
            width: 16px; height: 16px; border: 2px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
        .stat {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px 20px; flex: 1; min-width: 130px;
        }
        .stat .val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
        .stat .lbl { font-size: .76rem; color: var(--muted); margin-top: 2px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 18px;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px;
            transition: box-shadow .25s, transform .25s;
        }
        .card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.06); transform: translateY(-2px); }
        .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
        .card .sub { font-size: .82rem; color: var(--muted); margin-bottom: 12px; }
        .course-chips { display: flex; flex-wrap: wrap; gap: 5px; }
        .course-chips span {
            font-size: .74rem; font-weight: 500; padding: 3px 10px;
            background: #f3f4f6; color: #374151; border-radius: 5px;
        }

        .section-title {
            font-size: .88rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .05em; color: var(--muted); margin-bottom: 14px; margin-top: 32px;
        }

        .unique-list {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 18px 22px;
        }
        .unique-list .item {
            display: inline-block; font-size: .82rem; font-weight: 500;
            padding: 5px 14px; margin: 3px 4px; border-radius: 6px;
            background: var(--accent-soft); color: var(--accent);
        }

        .ft {
            margin-top: 48px; padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: .8rem; color: var(--muted); text-align: center;
        }
        @media (max-width: 640px) {
            .wrap { padding: 28px 16px 60px; }
            .hdr h1 { font-size: 1.4rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="hdr">
        <span class="badge">Lab 03 — Task 6</span>
        <h1>Mini University Portal</h1>
        <p>Classes &middot; Map &middot; Set &middot; Promises — Combined ES6 Features</p>
    </header>

    <button class="btn btn-primary" onclick="loadPortal()">Load Portal Data</button>
    <div id="status">Click the button to load university data.</div>

    <div id="app"></div>

    <footer class="ft">Developed by Hamdan Ali — Full-Stack Programming Lab 03</footer>
</div>
<script src="script.js"></script>
</body>
</html>
