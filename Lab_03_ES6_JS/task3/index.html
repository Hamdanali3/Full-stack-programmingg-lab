<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 — Async Data Loader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #6b7280;
            --accent: #7c3aed;
            --accent-soft: #f5f3ff;
            --border: #e5e7eb;
            --radius: 10px;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 880px; margin: 0 auto; padding: 48px 24px 80px; }
        .hdr { margin-bottom: 36px; }
        .hdr .badge {
            display: inline-block; font-size: .72rem; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--accent); background: var(--accent-soft);
            padding: 4px 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .hdr h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
        .hdr p { font-size: .92rem; color: var(--muted); }

        .controls {
            display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px;
        }
        .btn {
            padding: 10px 24px; font-size: .86rem; font-weight: 500;
            font-family: inherit; border: none; border-radius: 8px;
            cursor: pointer; transition: background .2s, transform .15s;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #6d28d9; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #b91c1c; }

        #status {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px 24px;
            font-size: .9rem; color: var(--muted); margin-bottom: 24px;
            min-height: 56px; display: flex; align-items: center; gap: 10px;
        }
        .spinner {
            width: 18px; height: 18px; border: 2px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .user-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px;
            transition: box-shadow .25s, transform .25s;
            opacity: 0; animation: fadeUp .4s ease forwards;
        }
        .user-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.06); transform: translateY(-2px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .user-card:nth-child(1) { animation-delay: .05s; }
        .user-card:nth-child(2) { animation-delay: .12s; }
        .user-card:nth-child(3) { animation-delay: .19s; }
        .user-card:nth-child(4) { animation-delay: .26s; }
        .user-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
        .user-card .detail { font-size: .84rem; color: var(--muted); margin-bottom: 3px; }

        .error-box {
            background: var(--danger-soft); border: 1px solid #fecaca;
            border-radius: var(--radius); padding: 20px 24px;
            color: var(--danger); font-size: .9rem; font-weight: 500;
        }

        .ft {
            margin-top: 48px; padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: .8rem; color: var(--muted); text-align: center;
        }
        @media (max-width: 640px) {
            .wrap { padding: 28px 16px 60px; }
            .hdr h1 { font-size: 1.4rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="hdr">
        <span class="badge">Lab 03 — Task 3</span>
        <h1>Async Data Loader</h1>
        <p>Promises &middot; setTimeout Simulation &middot; .then() / .catch() &middot; Dynamic DOM</p>
    </header>

    <div class="controls">
        <button class="btn btn-primary" onclick="loadUsers(false)">Fetch Users (Resolve)</button>
        <button class="btn btn-danger" onclick="loadUsers(true)">Simulate Error (Reject)</button>
    </div>

    <div id="status">Click a button above to fetch user data.</div>
    <section id="app" class="grid"></section>

    <footer class="ft">Developed by Hamdan Ali — Full-Stack Programming Lab 03</footer>
</div>
<script src="script.js"></script>
</body>
</html>
