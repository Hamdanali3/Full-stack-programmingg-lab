<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1 — Student Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-soft: #eff6ff;
            --border: #e5e7eb;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 960px; margin: 0 auto; padding: 48px 24px 80px; }

        /* Header */
        .hdr { margin-bottom: 36px; }
        .hdr .badge {
            display: inline-block; font-size: .72rem; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--accent); background: var(--accent-soft);
            padding: 4px 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .hdr h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
        .hdr p { font-size: .92rem; color: var(--muted); }

        /* Inline JS banner */
        .inline-bar {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px; margin-bottom: 32px;
        }
        .inline-bar span { font-size: .84rem; color: var(--muted); }
        .inline-bar button {
            padding: 8px 20px; font-size: .84rem; font-weight: 500; font-family: inherit;
            background: var(--accent); color: #fff; border: none; border-radius: 8px;
            cursor: pointer; transition: background .2s;
        }
        .inline-bar button:hover { background: #1d4ed8; }

        /* Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px;
            transition: box-shadow .25s, transform .25s;
        }
        .card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.06); transform: translateY(-2px); }
        .card .avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--accent); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: .82rem; font-weight: 600; margin-bottom: 14px;
        }
        .card h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 12px; }
        .meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .meta-row { display: flex; gap: 8px; font-size: .875rem; }
        .meta-row .k { color: var(--muted); min-width: 72px; }
        .meta-row .v { font-weight: 500; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tags span {
            font-size: .76rem; font-weight: 500; padding: 4px 11px;
            background: #f3f4f6; color: #374151; border-radius: 6px;
        }

        .ft {
            margin-top: 48px; padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: .8rem; color: var(--muted); text-align: center;
        }

        @media (max-width: 640px) {
            .wrap { padding: 28px 16px 60px; }
            .hdr h1 { font-size: 1.4rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">

    <header class="hdr">
        <span class="badge">Lab 03 — Task 1</span>
        <h1>Student Management System</h1>
        <p>ES6 Classes &middot; let &amp; const &middot; Template Literals &middot; Dynamic Rendering</p>
    </header>

    <div class="inline-bar">
        <span>Inline JavaScript demonstration</span>
        <button onclick="alert('Hello! Welcome to the Student Management System.')">Run Inline JS</button>
    </div>

    <section id="app" class="grid"></section>

    <footer class="ft">Developed by Hamdan Ali — Full-Stack Programming Lab 03</footer>
</div>
<script src="script.js"></script>
</body>
</html>
