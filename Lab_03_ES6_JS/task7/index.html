<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 7 — Student Data (JSON)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #6b7280;
            --accent: #b91c1c;
            --accent-soft: #fef2f2;
            --border: #e5e7eb;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }
        .hdr { margin-bottom: 36px; }
        .hdr .badge {
            display: inline-block; font-size: .72rem; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--accent); background: var(--accent-soft);
            padding: 4px 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .hdr h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
        .hdr p { font-size: .92rem; color: var(--muted); }

        .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px;
        }
        .panel h2 { font-size: .95rem; font-weight: 600; margin-bottom: 14px; }
        .code-block {
            background: #1e1e1e; color: #d4d4d4; border-radius: 8px;
            padding: 18px 20px; font-size: .8rem; line-height: 1.65;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            overflow-x: auto; white-space: pre; max-height: 340px;
        }
        .code-block .key { color: #9cdcfe; }
        .code-block .str { color: #ce9178; }
        .code-block .num { color: #b5cea8; }

        .section-title {
            font-size: .86rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .05em; color: var(--muted); margin: 28px 0 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px;
            transition: box-shadow .25s, transform .25s;
        }
        .card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.06); transform: translateY(-2px); }
        .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
        .card .sub { font-size: .82rem; color: var(--muted); margin-bottom: 10px; }
        .tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tags span {
            font-size: .74rem; font-weight: 500; padding: 3px 10px;
            background: #f3f4f6; color: #374151; border-radius: 5px;
        }

        .mapped-list {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 18px 22px; margin-top: 16px;
        }
        .mapped-list p { font-size: .88rem; margin-bottom: 4px; }
        .mapped-list p strong { font-weight: 600; }

        .ft {
            margin-top: 48px; padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: .8rem; color: var(--muted); text-align: center;
        }
        @media (max-width: 720px) {
            .wrap { padding: 28px 16px 60px; }
            .hdr h1 { font-size: 1.4rem; }
            .cols { grid-template-columns: 1fr; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="hdr">
        <span class="badge">Lab 03 — Task 7</span>
        <h1>Student Data — JSON</h1>
        <p>JSON.stringify &middot; JSON.parse &middot; Destructuring &middot; forEach &amp; map</p>
    </header>

    <div class="cols">
        <div class="panel">
            <h2>JSON.stringify Output</h2>
            <div class="code-block" id="jsonRaw"></div>
        </div>
        <div class="panel">
            <h2>JSON.parse &rarr; Destructured</h2>
            <div class="code-block" id="jsonParsed"></div>
        </div>
    </div>

    <div class="section-title">Student Cards (forEach rendering)</div>
    <div class="grid" id="cards"></div>

    <div class="section-title">Mapped Summary (Array.map)</div>
    <div class="mapped-list" id="mapped"></div>

    <footer class="ft">Developed by Hamdan Ali — Full-Stack Programming Lab 03</footer>
</div>
<script src="script.js"></script>
</body>
</html>
