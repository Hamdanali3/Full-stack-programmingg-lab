<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4 — Course Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #6b7280;
            --accent: #d97706;
            --accent-soft: #fffbeb;
            --border: #e5e7eb;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }
        .hdr { margin-bottom: 36px; }
        .hdr .badge {
            display: inline-block; font-size: .72rem; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--accent); background: var(--accent-soft);
            padding: 4px 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .hdr h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
        .hdr p { font-size: .92rem; color: var(--muted); }

        .input-row {
            display: flex; gap: 10px; margin-bottom: 24px;
        }
        .input-row input {
            flex: 1; padding: 10px 16px; font-size: .9rem; font-family: inherit;
            border: 1px solid var(--border); border-radius: 8px;
            outline: none; transition: border-color .2s;
        }
        .input-row input:focus { border-color: var(--accent); }
        .input-row button {
            padding: 10px 22px; font-size: .86rem; font-weight: 500;
            font-family: inherit; background: var(--accent); color: #fff;
            border: none; border-radius: 8px; cursor: pointer; transition: background .2s;
            white-space: nowrap;
        }
        .input-row button:hover { background: #b45309; }

        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
        }
        .panel h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px; }
        .course-list { list-style: none; }
        .course-list li {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 0; border-bottom: 1px solid #f3f4f6;
            font-size: .9rem;
        }
        .course-list li:last-child { border-bottom: none; }
        .course-list .num {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--accent-soft); color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: .76rem; font-weight: 600; flex-shrink: 0;
        }
        .info-bar {
            background: var(--accent-soft); border-radius: 8px;
            padding: 12px 18px; font-size: .86rem; color: #92400e;
            font-weight: 500;
        }
        #feedback {
            font-size: .84rem; margin-top: 12px; min-height: 22px;
            font-weight: 500;
        }

        .ft {
            margin-top: 48px; padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: .8rem; color: var(--muted); text-align: center;
        }
        @media (max-width: 640px) {
            .wrap { padding: 28px 16px 60px; }
            .hdr h1 { font-size: 1.4rem; }
            .input-row { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="hdr">
        <span class="badge">Lab 03 — Task 4</span>
        <h1>Unique Course Registration</h1>
        <p>ES6 Set &middot; Duplicate Prevention &middot; for...of Iteration</p>
    </header>

    <div class="input-row">
        <input type="text" id="courseInput" placeholder="Enter course name..." />
        <button onclick="registerCourse()">Register</button>
    </div>

    <div class="panel">
        <h2>Registered Courses — <span id="size">0</span> total</h2>
        <ul class="course-list" id="courseList">
            <li style="color: var(--muted); font-style: italic;">No courses registered yet.</li>
        </ul>
    </div>

    <div id="feedback"></div>

    <footer class="ft">Developed by Hamdan Ali — Full-Stack Programming Lab 03</footer>
</div>
<script src="script.js"></script>
</body>
</html>
