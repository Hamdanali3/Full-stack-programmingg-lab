<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5 — Product Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #6b7280;
            --accent: #0891b2;
            --accent-soft: #ecfeff;
            --border: #e5e7eb;
            --radius: 10px;
            --danger: #dc2626;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 880px; margin: 0 auto; padding: 48px 24px 80px; }
        .hdr { margin-bottom: 36px; }
        .hdr .badge {
            display: inline-block; font-size: .72rem; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--accent); background: var(--accent-soft);
            padding: 4px 12px; border-radius: 6px; margin-bottom: 10px;
        }
        .hdr h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
        .hdr p { font-size: .92rem; color: var(--muted); }

        .toolbar {
            display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
            align-items: center;
        }
        .toolbar input {
            flex: 1; min-width: 180px; padding: 10px 16px;
            font-size: .9rem; font-family: inherit;
            border: 1px solid var(--border); border-radius: 8px;
            outline: none; transition: border-color .2s;
        }
        .toolbar input:focus { border-color: var(--accent); }
        .btn {
            padding: 10px 20px; font-size: .84rem; font-weight: 500;
            font-family: inherit; border: none; border-radius: 8px;
            cursor: pointer; transition: background .2s; white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #0e7490; }

        .stat-row {
            display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px;
        }
        .stat-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px 22px; flex: 1; min-width: 140px;
        }
        .stat-box .num { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .stat-box .lbl { font-size: .78rem; color: var(--muted); margin-top: 2px; }

        .table-wrap {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: .88rem; }
        thead { background: #f9fafb; }
        th { text-align: left; padding: 12px 18px; font-weight: 600; font-size: .78rem;
             text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
        td { padding: 14px 18px; border-top: 1px solid #f3f4f6; }
        tr:hover td { background: #fafafa; }
        .del-btn {
            font-size: .78rem; font-weight: 500; color: var(--danger);
            background: none; border: none; cursor: pointer;
            text-decoration: underline; font-family: inherit;
        }

        #result {
            margin-top: 16px; padding: 14px 20px;
            background: var(--accent-soft); border-radius: 8px;
            font-size: .88rem; color: #155e75; display: none;
        }

        .ft {
            margin-top: 48px; padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: .8rem; color: var(--muted); text-align: center;
        }
        @media (max-width: 640px) {
            .wrap { padding: 28px 16px 60px; }
            .hdr h1 { font-size: 1.4rem; }
            th, td { padding: 10px 12px; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="hdr">
        <span class="badge">Lab 03 — Task 5</span>
        <h1>Product Catalog</h1>
        <p>ES6 Map &middot; Key-Value Storage &middot; Search &amp; Delete &middot; .size</p>
    </header>

    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search by product ID (e.g. PRD-101)" />
        <button class="btn btn-primary" onclick="searchProduct()">Search</button>
    </div>

    <div class="stat-row" id="stats"></div>
    <div class="table-wrap"><table><thead><tr>
        <th>ID</th><th>Product</th><th>Category</th><th>Price</th><th></th>
    </tr></thead><tbody id="tbody"></tbody></table></div>

    <div id="result"></div>

    <footer class="ft">Developed by Hamdan Ali — Full-Stack Programming Lab 03</footer>
</div>
<script src="script.js"></script>
</body>
</html>
