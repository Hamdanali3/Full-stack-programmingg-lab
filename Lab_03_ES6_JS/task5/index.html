<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task 5 - Product Catalog using Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0000, #3d0c02, #5a1a00);
            color: #e0e0e0;
            padding: 20px;
        }
        .header {
            text-align: center; padding: 40px 20px 30px;
            animation: fadeDown 0.8s ease;
        }
        .header h1 {
            font-size: 2.4rem; font-weight: 700;
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 1rem; color: #aaa; font-weight: 300; margin-top: 6px; }

        .btn-greet {
            display: inline-block; margin: 20px auto; padding: 12px 32px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: #fff; border: none; border-radius: 50px;
            font-family: 'Poppins', sans-serif; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 4px 20px rgba(238, 9, 121, 0.35);
        }
        .btn-greet:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 30px rgba(238, 9, 121, 0.5); }

        #output { max-width: 800px; margin: 30px auto; padding: 0 10px; }

        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 28px;
            margin-bottom: 24px;
            animation: fadeUp 0.6s ease both;
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, #ff6a00, #ee0979);
        }

        .card h2 {
            font-size: 1.25rem; font-weight: 600; color: #ff6a00;
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .card p { margin: 8px 0; font-size: 0.95rem; }
        .label { font-weight: 500; color: #aaa; }
        .value { color: #fff; font-weight: 500; }

        .product-row {
            background: rgba(255, 106, 0, 0.06);
            border: 1px solid rgba(255, 106, 0, 0.12);
            border-radius: 14px; padding: 18px; margin: 12px 0;
            display: grid; grid-template-columns: 50px 1fr auto;
            gap: 16px; align-items: center;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .product-row:hover {
            transform: translateX(6px);
            box-shadow: 0 6px 20px rgba(255, 106, 0, 0.12);
        }
        .product-icon {
            width: 46px; height: 46px; border-radius: 14px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #fff;
        }
        .product-price {
            font-size: 1.1rem; font-weight: 700;
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .category-tag {
            padding: 3px 12px; border-radius: 50px; font-size: 0.78rem;
            background: rgba(238, 9, 121, 0.12);
            color: #ff79b0; border: 1px solid rgba(238, 9, 121, 0.25);
        }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255, 106, 0, 0.15);
            color: #ffab76; padding: 6px 16px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 600;
        }

        .deleted-banner {
            background: rgba(255, 68, 68, 0.08);
            border-left: 3px solid #ff4444;
            padding: 12px 16px; border-radius: 10px;
            color: #ff6b6b; margin-top: 10px;
        }
        .found-banner {
            background: rgba(0, 230, 118, 0.08);
            border-left: 3px solid #00e676;
            padding: 12px 16px; border-radius: 10px;
            color: #00e676; margin-top: 10px;
        }

        @keyframes fadeDown { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }

        @media(max-width:768px){ .header h1{font-size:1.8rem} .product-row{grid-template-columns:1fr} }
        @media(max-width:480px){ body{padding:10px} .header h1{font-size:1.5rem} .card{padding:20px 16px} }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-store"></i> Product Catalog</h1>
        <p>Lab Task 5 &mdash; ES6 Map (Key-Value Pairs)</p>
    </div>

    <div style="text-align:center;">
        <button class="btn-greet" onclick="alert('Welcome to Product Catalog!')">
            <i class="fas fa-hand-sparkles"></i>&ensp;Click to Greet
        </button>
    </div>

    <div id="output"></div>

    <script src="script.js"></script>
</body>
</html>
