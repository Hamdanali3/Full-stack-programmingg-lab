<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your HotTub Haven account to manage orders, track shipments, and more.">
  <title>Login - HotTub Haven</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="preloader"><div class="spinner"></div></div>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">HotTub<span>Haven</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><i class="fas fa-bars"></i></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="category.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-icons d-flex align-items-center">
          <a href="my-account.html"><i class="fas fa-user"></i></a>
          <a href="shopping-cart.html" class="position-relative"><i class="fas fa-shopping-bag"></i><span class="cart-count">3</span></a>
        </div>
      </div>
    </div>
  </nav>

  <section class="page-banner">
    <div class="container">
      <h1 class="fade-in">Sign In</h1>
      <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Login</li></ol></nav>
    </div>
  </section>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card scale-in">
        <div class="auth-header">
          <h3><i class="fas fa-sign-in-alt me-2"></i>Welcome Back</h3>
          <p>Sign in to your account to continue</p>
        </div>
        <div class="auth-body">
          <form id="loginForm" novalidate>
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="loginEmail" placeholder="Email Address" required>
              <label for="loginEmail"><i class="fas fa-envelope me-1"></i> Email Address</label>
            </div>
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
              <label for="loginPassword"><i class="fas fa-lock me-1"></i> Password</label>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label" for="rememberMe" style="font-size:0.9rem;">Remember Me</label>
              </div>
              <a href="forgot-password.html" style="font-size:0.9rem;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 mb-3">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
          </form>

          <div class="divider-text"><span>or sign in with</span></div>

          <div class="social-login">
            <div class="row g-2">
              <div class="col-6">
                <button class="btn w-100"><i class="fab fa-google text-danger"></i> Google</button>
              </div>
              <div class="col-6">
                <button class="btn w-100"><i class="fab fa-facebook-f text-primary"></i> Facebook</button>
              </div>
            </div>
          </div>

          <p class="text-center mt-4 mb-0" style="font-size:0.9rem;">
            Don't have an account? <a href="register.html" class="fw-semibold text-secondary-custom">Create Account</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="margin-top:0; border-top:none;">
        <div class="row align-items-center">
          <div class="col-md-6"><p>&copy; 2025 HotTub Haven. All Rights Reserved.</p></div>
          <div class="col-md-6 text-md-end"><div class="payment-icons"><i class="fab fa-cc-visa"></i><i class="fab fa-cc-mastercard"></i><i class="fab fa-cc-amex"></i><i class="fab fa-cc-paypal"></i></div></div>
        </div>
      </div>
    </div>
  </footer>

  <button class="back-to-top"><i class="fas fa-chevron-up"></i></button>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
</body>
</html>
