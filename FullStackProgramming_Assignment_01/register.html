<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your HotTub Haven account to start shopping premium hot tubs and spas.">
  <title>Register - HotTub Haven</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="preloader"><div class="spinner"></div></div>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">HotTub<span>Haven</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><i class="fas fa-bars"></i></button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="category.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-icons d-flex align-items-center">
          <a href="my-account.html"><i class="fas fa-user"></i></a>
          <a href="shopping-cart.html" class="position-relative"><i class="fas fa-shopping-bag"></i><span class="cart-count">3</span></a>
        </div>
      </div>
    </div>
  </nav>

  <section class="page-banner">
    <div class="container">
      <h1 class="fade-in">Create Account</h1>
      <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Register</li></ol></nav>
    </div>
  </section>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card scale-in" style="max-width:550px;">
        <div class="auth-header">
          <h3><i class="fas fa-user-plus me-2"></i>Create Account</h3>
          <p>Join HotTub Haven for exclusive deals and offers</p>
        </div>
        <div class="auth-body">
          <form id="registerForm" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="text" class="form-control" id="firstName" name="firstName" placeholder="First Name" required>
                  <label for="firstName">First Name *</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Last Name" required>
                  <label for="lastName">Last Name *</label>
                </div>
              </div>
            </div>

            <div class="form-floating mt-3">
              <input type="email" class="form-control" id="registerEmail" placeholder="Email Address" required>
              <label for="registerEmail"><i class="fas fa-envelope me-1"></i> Email Address *</label>
            </div>

            <div class="form-floating mt-3">
              <input type="tel" class="form-control" id="registerPhone" name="phone" placeholder="Phone Number">
              <label for="registerPhone"><i class="fas fa-phone me-1"></i> Phone Number</label>
            </div>

            <div class="form-floating mt-3 mb-1">
              <input type="password" class="form-control" id="registerPassword" placeholder="Password" required>
              <label for="registerPassword"><i class="fas fa-lock me-1"></i> Password *</label>
            </div>
            <div class="password-strength mb-1"><div class="strength-bar"></div></div>
            <small class="strength-label text-muted"></small>

            <div class="form-floating mt-3">
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
              <label for="confirmPassword"><i class="fas fa-lock me-1"></i> Confirm Password *</label>
            </div>

            <div class="form-check mt-3">
              <input class="form-check-input" type="checkbox" id="agreeTerms" required>
              <label class="form-check-label" for="agreeTerms" style="font-size:0.85rem;">
                I agree to the <a href="terms-conditions.html" class="text-secondary-custom">Terms &amp; Conditions</a> and <a href="#" class="text-secondary-custom">Privacy Policy</a>
              </label>
            </div>

            <div class="form-check mt-2">
              <input class="form-check-input" type="checkbox" id="newsletter">
              <label class="form-check-label" for="newsletter" style="font-size:0.85rem;">
                Subscribe to our newsletter for deals and updates
              </label>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 mt-4 mb-3">
              <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
          </form>

          <div class="divider-text"><span>or sign up with</span></div>

          <div class="social-login">
            <div class="row g-2">
              <div class="col-6"><button class="btn w-100"><i class="fab fa-google text-danger"></i> Google</button></div>
              <div class="col-6"><button class="btn w-100"><i class="fab fa-facebook-f text-primary"></i> Facebook</button></div>
            </div>
          </div>

          <p class="text-center mt-4 mb-0" style="font-size:0.9rem;">
            Already have an account? <a href="login.html" class="fw-semibold text-secondary-custom">Sign In</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="margin-top:0; border-top:none;">
        <div class="row align-items-center">
          <div class="col-md-6"><p>&copy; 2025 HotTub Haven. All Rights Reserved.</p></div>
          <div class="col-md-6 text-md-end"><div class="payment-icons"><i class="fab fa-cc-visa"></i><i class="fab fa-cc-mastercard"></i><i class="fab fa-cc-amex"></i><i class="fab fa-cc-paypal"></i></div></div>
        </div>
      </div>
    </div>
  </footer>

  <button class="back-to-top"><i class="fas fa-chevron-up"></i></button>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
</body>
</html>
